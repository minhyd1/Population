version: '3.8'
services:
  # ============================================================
  # PostgreSQL Database
  # ============================================================
  postgres:
    image: postgres:16-alpine
    container_name: population-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: population_db
    ports:
      - "5432:5432"
    volumes:
    - type: bind
      source: ../scripts/001_create_tables.sql
      target: /docker-entrypoint-initdb.d/01_create_tables.sql
    - type: bind
      source: ../scripts/002_seed_data.sql
      target: /docker-entrypoint-initdb.d/02_seed_data.sql
    # THÊM DÒNG NÀY:
    - type: bind
      source: ../scripts/003_seed_citizens.sql
      target: /docker-entrypoint-initdb.d/03_seed_citizens.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - population-net
  # ============================================================
  # Population Service API
  # ============================================================
  api:
    build:
      context: ..
      dockerfile: deployments/Dockerfile
    container_name: population-api
    environment:
      APP_PORT: 8080
      APP_ENV: development
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres123
      DB_NAME: population_db
      DB_SSLMODE: disable
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY=}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - population-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  population-net:
    driver: bridge